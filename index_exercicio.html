<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício de Lógica de programação</title>
</head>
<body>
    <h1>Exercício de Lógica de programação</h1>

    <script>

        //pedir para o usuario digitar um numero e converter em um numero inteiro
        var n1 = prompt('Digite um número.');
        n1 = parseInt(n1);

        //pedir para o usuario digitar outro numero e converter em um numero inteiro
        var n2 = prompt('Digite outro número.')
        n2 = parseInt(n2);

        //mostrar a subtração concatenando com o texto 'a subtração é:...'
        alert('A subtração é: ' + (n1 - n2) ); 
        //mostrar a multiplição concatenando com o texto 'a multiplição é:...'
        alert('A multiplicação é: ' + (n1 * n2) );
        //mostrar a divisão concatenando com o texto 'a divisão é:...'
        alert('A divisão é: ' + (n1 / n2) );
        //mostrar a soma concatenando com o texto 'a soma é:...'
         alert('A soma é: ' + (n1 + n2) );

    </script>
</body>
</html>
