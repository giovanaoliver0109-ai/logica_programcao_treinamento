<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lógica de programação com JavaScript</title>
</head>
<body>
    <h1>Lógica de programção com JavaScript </h1>
    <script>
    
    //pedir para o usuario digitar um numero
    var n1 = prompt('digite um numero'); 
    
    n1 = parseFloat(n1);

    //pedir para o usuario digitar outro numero
    var n2 = prompt('Digite mais um número');

    n2 = parseFloat(n2);

    //mostrar a soma
    alert(n1 + n2);


    
    </script>
</body>
</html>
